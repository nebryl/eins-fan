<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Dashboard</title>

<style>
:root{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#cfcfcf;
  --accent:#e50914;
  --muted:#8a8a8a;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  font-weight:bold;
  cursor:pointer;
  color:var(--accent);
  font-size:18px;
}

.container{padding:20px;}

.row{margin-bottom:30px;}
.row h2{font-size:16px; margin-bottom:10px; color:#ddd;}

.scroll{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:10px;
}
.scroll::-webkit-scrollbar{display:none;}

.card{
  min-width:200px;
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.2s;
}
.card:hover{transform:scale(1.05);}

.card img{width:100%; display:block;}

.card span{
  display:block;
  padding:8px;
  font-size:12px;
  color:var(--muted);
}

.progress{
  position:absolute;
  bottom:0;
  left:0;
  height:3px;
  background:var(--accent);
  width:0%;
}

/* PLAYER */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  z-index:999;
}

.player{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80vw;
  max-width:900px;
  aspect-ratio:16/9;
  background:black;
  display:none;
  z-index:1000;
  border-radius:12px;
  overflow:hidden;
}

#yt{
  width:100%;
  height:100%;
}

button.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--accent);
  border:none;
  padding:12px 14px;
  border-radius:12px;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="reloadAll()">STREAM</div>
</header>

<div class="container">

  <div class="row">
    <h2>Spandau</h2>
    <div class="scroll" id="spandau"></div>
  </div>

  <div class="row">
    <h2>LoL</h2>
    <div class="scroll" id="lol"></div>
  </div>

  <div class="row">
    <h2>Fußball</h2>
    <div class="scroll" id="football"></div>
  </div>

  <div class="row">
    <h2>Mediathek</h2>
    <div class="scroll" id="media"></div>
  </div>

</div>

<div class="overlay" onclick="closePlayer()"></div>
<div class="player">
  <div id="yt"></div>
</div>

<button class="fab" onclick="openTwitch()">Twitch</button>

<script>
const channels = {
  spandau:"UC5QM2OXKyZaNw13iLbuEpCg",
  lol:"UCeM9ckIXeJFvdt4bKpXvTqw",
  football:"UCMQkXTIDVvVDh0ZuVB_0APg",
  media:"UCeuKtCc2Q0ySUxYX8yRZhcg"
};

let player;
let currentId=null;

function parseId(url){
  if(!url) return null;
  if(url.includes("shorts")) return url.split("shorts/")[1].split("?")[0];
  if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
  return url.split("/").pop();
}

/* WATCH PROGRESS */
function save(id,t,d){localStorage.setItem("v_"+id,JSON.stringify({t,d}))}
function load(id){return JSON.parse(localStorage.getItem("v_"+id)||"null")}

function card(item){
  const id=parseId(item.link);
  const el=document.createElement("div");
  el.className="card";

  const img=`https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  el.innerHTML=`
    <img loading="lazy" src="${img}">
    <span>${item.title}</span>
    <div class="progress"></div>
  `;

  const saved=load(id);
  if(saved){
    el.querySelector(".progress").style.width=(saved.t/saved.d)*100+"%";
  }

  el.onclick=()=>open(id);
  return el;
}

function open(id){
  currentId=id;
  document.querySelector(".overlay").style.display="block";
  document.querySelector(".player").style.display="block";

  const start=load(id)?.t||0;

  if(player){
    player.loadVideoById({videoId:id,startSeconds:start});
  } else {
    player=new YT.Player("yt",{
      videoId:id,
      playerVars:{autoplay:1,start:start},
      events:{onReady:()=>setInterval(track,1000)}
    });
  }
}

function track(){
  if(!player||!currentId)return;
  const t=player.getCurrentTime();
  const d=player.getDuration();
  save(currentId,t,d);
}

function closePlayer(){
  document.querySelector(".overlay").style.display="none";
  document.querySelector(".player").style.display="none";
  if(player) player.stopVideo();
}

async function loadFeed(id){
  const url=`https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
  const res=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url));
  const txt=await res.text();
  const xml=new DOMParser().parseFromString(txt,"text/xml");

  return [...xml.querySelectorAll("entry")].map(e=>({
    title:e.querySelector("title").textContent,
    link:e.querySelector("link").getAttribute("href")
  }));
}

async function loadCol(key,id){
  const box=document.getElementById(key);
  box.innerHTML="";
  const items=await loadFeed(id);
  items.forEach(i=>box.appendChild(card(i)));
}

function reloadAll(){
  Object.entries(channels).forEach(([k,v])=>loadCol(k,v));
}

function openTwitch(){
  window.open("https://www.twitch.tv/eintrachtspandau");
}

reloadAll();
</script>

<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
