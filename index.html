<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>YouTube Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* 📊 4 Spalten */
    .container {
      display: flex;
      gap: 12px;
      padding: 12px;
    }

    /* 🧱 jede Spalte = kleine Kachel */
    .column {
      flex: 1;
      background: #1b1b1b;
      border-radius: 12px;
      padding: 10px;
      height: 95vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .channel-title {
      text-align: center;
      font-size: 16px;
      padding: 8px;
      background: #222;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    /* 🔲 INNER LAYOUT (oben Videos, unten Shorts) */
    .section {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      background: #141414;
      border-radius: 10px;
      padding: 8px;
    }

    .section h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #aaa;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }

    .video {
      display: flex;
      gap: 8px;
      background: #222;
      padding: 6px;
      margin: 6px 0;
      border-radius: 8px;
      align-items: center;
      font-size: 12px;
    }

    .video img {
      width: 90px;
      border-radius: 6px;
    }

    .video a {
      color: white;
      text-decoration: none;
      flex: 1;
    }

    /* Scrollbar clean */
    .section::-webkit-scrollbar {
      width: 5px;
    }

    .section::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- SPANDAU -->
  <div class="column">
    <div class="channel-title">Eintracht Spandau</div>

    <div class="section">
      <h3>🎬 Videos</h3>
      <div id="spandau-videos"></div>
    </div>

    <div class="section">
      <h3>🔥 Shorts</h3>
      <div id="spandau-shorts"></div>
    </div>
  </div>

  <!-- LOL -->
  <div class="column">
    <div class="channel-title">LoL</div>

    <div class="section">
      <h3>🎬 Videos</h3>
      <div id="lol-videos"></div>
    </div>

    <div class="section">
      <h3>🔥 Shorts</h3>
      <div id="lol-shorts"></div>
    </div>
  </div>

  <!-- FUSSBALL -->
  <div class="column">
    <div class="channel-title">Fußball</div>

    <div class="section">
      <h3>🎬 Videos</h3>
      <div id="fussball-videos"></div>
    </div>

    <div class="section">
      <h3>🔥 Shorts</h3>
      <div id="fussball-shorts"></div>
    </div>
  </div>

  <!-- MEDIA -->
  <div class="column">
    <div class="channel-title">Media</div>

    <div class="section">
      <h3>🎬 Videos</h3>
      <div id="media-videos"></div>
    </div>

    <div class="section">
      <h3>🔥 Shorts</h3>
      <div id="media-shorts"></div>
    </div>
  </div>

</div>

<script>

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  media: "UCeuKtCc2Q0ySUxYX8yRZhcg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw",
  fussball: "UCMQkXTIDVvVDh0ZuVB_0APg"
};

async function getFeed(channelId) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url));
  const data = await res.json();
  return data.items || [];
}

function isShort(item) {
  return item.link.includes("/shorts/");
}

function getVideoId(url) {
  return url.split("v=")[1]?.split("&")[0] || url.split("/shorts/")[1];
}

function createVideo(item) {
  const id = getVideoId(item.link);
  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";

  div.innerHTML = `
    <img src="${thumb}">
    <a href="${item.link}" target="_blank">${item.title}</a>
  `;

  return div;
}

async function loadColumn(prefix, channelId) {
  const items = await getFeed(channelId);

  const videosBox = document.getElementById(prefix + "-videos");
  const shortsBox = document.getElementById(prefix + "-shorts");

  videosBox.innerHTML = "";
  shortsBox.innerHTML = "";

  items.forEach(item => {
    const el = createVideo(item);

    if (isShort(item)) {
      shortsBox.appendChild(el);
    } else {
      videosBox.appendChild(el);
    }
  });
}

function loadAll() {
  loadColumn("spandau", channels.spandau);
  loadColumn("lol", channels.lol);
  loadColumn("fussball", channels.fussball);
  loadColumn("media", channels.media);
}

loadAll();

// 🔄 Auto Refresh 5 Minuten
setInterval(loadAll, 5 * 60 * 1000);

</script>

</body>
</html>
