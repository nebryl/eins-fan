<style>

:root {
  --bg: #000;
  --text: #9B978E;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

body.skin-classic {
  --bg: #000;
  --bglight: #131313; 
  --text: #ffffff;  /* 9B978E leicht aufgehellt für besseren Kontrast */
  --accent: #000;
  --heroText: #ffffff;
  --shadow: 1px;
  --shadowColor: #ffffff;
  --topbar-gradient: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 1) 0%,
    rgba(0, 0, 0, 0.95) 40%,
    rgba(0, 0, 0, 0.75) 70%,
    rgba(0, 0, 0, 0) 100%
  );
  --hero-mask: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 65%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.2) 85%,
    rgba(0,0,0,0) 100%
  );
}

body.skin-white {
  --bg: #f4f4f4;
  --bglight: #000000; 
  --text: #000000;
  --accent: #316A7D;
  --heroText: #ffffff;
  --shadow: 25px;
  --shadowColor: #000000;
  --topbar-gradient: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 1) 0%,
    rgba(0, 0, 0, 0.95) 70%,
    rgba(0, 0, 0, 0.75) 80%,
    rgba(0, 0, 0, 0) 100%
  );
  --hero-mask: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 95%,
    rgba(0,0,0,0) 100%
  );
}

body.skin-citadel {
  --bg: #0d0f12;
  --bglight: #C8CDD2;
  --text: #828282;
  --accent: #316A7D;
  --heroText: #ffffff;
  --shadow: 35px;
  --shadowColor: #707070;
  --topbar-gradient: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 1) 0%,
    rgba(0, 0, 0, 0.95) 70%,
    rgba(0, 0, 0, 0.75) 80%,
    rgba(0, 0, 0, 0) 100%
  );
  --hero-mask: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 97%,
    rgba(0,0,0,0) 100%
  );
  background-image: url("./Zitadelle.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* LOGIN */
#loginView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  width: 100%;
  margin: 0;
  text-align: center;
  background: var(--bg);
}

/* Login Card */
#loginView form {
  width: 320px;
  padding: 25px;

  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  animation: popIn 0.4s ease;
}

/* Titel */
#loginView h2 {
  color: #d6d3cc;
  margin-bottom: 20px;
  font-size: 26px;
  letter-spacing: 1px;
}

/* Inputs */
#loginView input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--bg);
  color: #ddd;
  outline: none;
  transition: 0.2s;
}

#loginView input:focus {
  border-color: #316A7D;
  box-shadow: 0 0 10px rgba(49,106,125,0.4);
}

/* Button */
#loginView button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(135deg, #B74F46, #316A7D);
  color: white;

  transition: 0.2s;
}

#loginView button:hover {
  transform: scale(1.03);
  filter: brightness(1.1);
}

/* Animation */
@keyframes popIn {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* APP */
#appView {
  display: none;
}

.container {
  padding: 20px;
}

.row {
  margin-bottom: 30px;
}

.row-scroll {
  display: flex;
  gap: 10px;
  height: 200px;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  padding: 10px;
  border-radius: 12px;
  background: var(--bglight);
  border: 1px solid var(--accent);
  box-shadow: 0 1px var(--shadow) var(--shadowColor);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* VIDEO */
.video {
  min-width: 280px;
  max-width: 280px;
  aspect-ratio: 16/9;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  will-change: transform;
  scroll-snap-align: start;
}

.video img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video span {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;

  padding: 10px;

  font-size: 12px;
  font-weight: 600;

  color: white;

  background: linear-gradient(
    to top,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.2),
    transparent
  );

  backdrop-filter: blur(2px);

  z-index: 2;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.video:hover {
  transform: scale(1.05);
  z-index: 20;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* PROGRESS */
.mini-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, red, #ff4444);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  z-index: 9998;
  pointer-events: auto;
}

/* PLAYER */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 9999;
}

#player {
  width: 100%;
  height: 100%;
  pointer-events: auto;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1px 20px;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: var(--topbar-gradient);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 50px;
  z-index: 50;
  pointer-events: none;

  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.9),
    rgba(0,0,0,0)
  );
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}

.logo img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  display: block;
}

.title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 1.5px;
  position: relative;
  z-index: 1;
  color: #d6d3cc;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

/* kompakter, dunkler Spotlight-Hintergrund */
.title::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 300%;
  height: 130%;

  background: radial-gradient(
    circle,
    rgba(0, 0, 0, 0.85) 0%,
    rgba(0, 0, 0, 0.55) 35%,
    rgba(0, 0, 0, 0.15) 60%,
    rgba(0, 0, 0, 0) 80%
  );

  filter: blur(4px);
  z-index: -1;
  pointer-events: none;
}

.eins {
  color: #B74F46;
}

.flix {
  color: #316A7D;
}

.right-side {
  display: flex;
  align-items: center;
  gap: 10px;
}

#welcome {
  color: #9B978E;
  margin: 0;
}

.logout {
  color: #9B978E;
  cursor: pointer;
  background: #333;

  border-radius: 6px;
}

.pw-wrapper {
  position: relative;

  align-items: center;
}

.pw-wrapper input {
  width: 100%;
  padding-right: 40px;
}

.eye {

  user-select: none;

}

.eye:hover {
  opacity: 1;
}

.video.short {
  min-width: 140px;

}

#continue-videos .video {

}

#new-videos .video {
  min-width: 400px !important;

}

  min-width: 180px !important;

}

  min-width: 175px;

}

.video.short span {
  font-size: 11px;

}

.badge-new {
  position: absolute;
  top: 6px;
  right: 6px;
  background: red;
  color: white;
  font-size: 10px;
  padding: 2px 6px;

  font-weight: bold;
}

.impressum {
  color: #9B978E;
  text-decoration: none;

  font-size: 16px; /* gleich wie Standard-Text */

  align-items: center;
}

.impressum:hover {
  opacity: 1;
  text-decoration: underline;
}

/* HERO SECTION */
.hero-section {
  width: 100vw;
  margin-left: calc(-50vw + 50%);

  position: relative;
  z-index: 1;

  padding: 0;
  margin-top: 0;
  margin-bottom: 0;

  height: 60vh;
  overflow: hidden;
}
.hero-section-football {
  width: 100vw;
  margin-left: calc(-50vw + 50%);

  position: relative;
  z-index: 1;

  padding: 0;

  height: 60vh;
  overflow: hidden;
}

@media (max-width: 768px) {
  #new-videos-row {
    margin-top: -60px;
  }
  .hero-section {
    height: 45vh;
  }

    height: 45vh;
  }
}

.hero-banner {
  width: 100%;
  height: 100%;
  background: var(--bg);
  position: relative;
  cursor: pointer;
  overflow: hidden;
  z-index: 2;
  mask-image: var(--hero-mask, none);
  -webkit-mask-size: 100% 100%;
  mask-size: 100% 100%;
}

.hero-banner-football {
  width: 100%;
  height: 100%;
  background: #2a2926;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  z-index: 2;

  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 65%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.2) 85%,
    rgba(0,0,0,0) 100%
  );
  -webkit-mask-size: 100% 100%;
  mask-size: 100% 100%;
}

.hero-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}

.hero-banner-football img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}

/* Nur sanftes Ausfaden am unteren Rand */
.hero-banner::after {
  display: none;
}

.hero-info {
  position: absolute;
  top: 70%;
  right: 60px;
  z-index: 4;
  max-width: 500px;
  text-align: right;
}

.hero-info h1 {
  margin: 0;
  font-size: 20px;
  font-weight: 600;
  color: var(--heroText);
  line-height: 1.2;
  text-shadow: 0 4px 20px rgba(0,0,0,0.9);
}

/* NEW VIDEOS - LARGE */
.video.large {
  min-width: 420px;
  max-width: 420px;
  aspect-ratio: 16/9;
}

#new-videos .video.large.short {
  min-width: 210px;
  max-width: 210px;
}

#new-videos-row {
  min-width: 350px;
  position: relative;
  z-index: 10;
  margin-top: -50px;
}

#continue-row {
  min-width: 280px;
  position: relative;
  z-index: 10;
}

.video-hover {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 5;
  display: none;
  background: black;
  pointer-events: none;
}

.hover-preview iframe {
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.video-meta {
  position: fixed;
  top: calc(50% + 240px);
  left: 50%;
  transform: translateX(-50%);
  
  width: 800px;
  padding: 15px 20px;

  background: rgba(20,20,19,0.95);
  border-radius: 10px;

  color: #9B978E;

  z-index: 10000;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.video-meta h3 {
  margin: 0;
  font-size: 18px;
  color: white;
}

.video-meta p {
  margin: 5px 0 0;
  font-size: 13px;
  opacity: 0.8;
}

.cola {
  position: fixed;
  width: 40px;
  height: 40px;
  background-image: url("./cola.png");
  background-size: contain;
  background-repeat: no-repeat;

  pointer-events: auto;
  cursor: pointer;

  z-index: 99999;

  animation: colaFall 8s linear forwards;
}

.like-btn {
  padding: 8px 12px;
  background: #316A7D;
  color: white;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

#like-button {
  position: absolute;
  bottom: 10px;
  right: 15px;
}

.like-btn:hover {
  background: #316A7D;
}

.cola-icon {
  width: 18px;
  height: 18px;
  object-fit: contain;
  vertical-align: middle;
  margin-right: 6px;
}

.profile-card {
  width: 160px;
  height: 200px;
  background: #1b1a18;
  border-radius: 16px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  cursor: pointer;

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.profile-card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin-bottom: 15px;
  background-size: cover;
  background-position: center;
}

.einsonly {
  background: linear-gradient(135deg, #B74F46, #8c3b35);
}

.einsplus {
  background: linear-gradient(135deg, #316A7D, #244f5d);
}

.name {
  font-size: 16px;
  font-weight: 600;
  color: #ddd;
}

.nav-btn {
  background: #1b1a18;
  border: 1px solid #2f2e2b;
  color: #9B978E;

  padding: 6px 10px;
  border-radius: 6px;

  cursor: pointer;
  font-size: 14px;

  transition: 0.2s;
}

.nav-btn:hover {
  background: rgba(255,255,255,0.1);
  color: white;
}

.nav-btn.active {
  background: linear-gradient(135deg, #B74F46, #316A7D);
  color: white;
  border: none;
}

.page {
  display: none;

}

}

}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 12px;
  margin-top: 10px;
}

#playerView {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

#playerArea {
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
}

#colaZone {
  position: relative;
  width: 200px;
  height: 450px;
  overflow: hidden;
}

#colaCounter {
  color: #9B978E;
  display: flex;
  align-items: center;
  gap: 6px;
}

#profileView {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg);
}

.fussballde_widget {
  border-radius: 12px;
  overflow: hidden;
}

.table-card {

  border-radius: 10px;

  transition: transform 0.2s ease, box-shadow 0.2s ease;

.section-title {
  margin: 20px 0 10px 0;
}

  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;

  padding: 15px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.video.no-hover .video-hover {
  display: none !important;
}

  position: relative;
  display: flex;
  flex-direction: column;
  min-width: 320px;
  max-width: 320px;
  aspect-ratio: 16/9;
  border-radius: 12px;
  overflow: hidden;
  text-decoration: none;
  background: #111;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  will-change: transform;

/* 🔷 Badge oben rechts */
.tile-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  padding: 3px 6px;
  border-radius: 6px;
  background: #e50914; /* Netflix Rot */
  color: white;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;

  position: absolute;

  border-radius: 12px;

  cursor: pointer;
  transition: 0.2s;
}

.skin-item:hover {

}

  0% {
    transform: translateY(-100px);
    opacity: 0;

  10% {

  }
  100% {
    transform: translateY(100vh);
    opacity: 0;
  }

<body>

<!-- LOGIN -->

/* ================= PROGRESS STORAGE ================= */

function saveProgress(id, time, duration, title, isShort = false) {
  localStorage.setItem(getProfileKey(id), JSON.stringify({
    time,
    duration,
    title,
    isShort,
    ts: Date.now()
  }));
  limitProgressEntries(50);
}

function limitProgressEntries(maxItems = 50) {

  const profile = localStorage.getItem("user") || "default";
  const prefix = `vid_${profile}_`;

  const items = [];

  // alle relevanten Einträge sammeln
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);

    if (!key.startsWith(prefix)) continue;

    try {
      const data = JSON.parse(localStorage.getItem(key));
      items.push({
        key,
        ts: data?.ts || 0
      });
    } catch {}
  }

  // nach Zeit sortieren (älteste zuerst)
  items.sort((a, b) => a.ts - b.ts);

  // wenn zu viele → löschen
  while (items.length > maxItems) {
    const oldest = items.shift();
    localStorage.removeItem(oldest.key);
  }
}

function getProgress(id) {
  const data = localStorage.getItem(getProfileKey(id));
  if (!data) return null;

  const parsed = JSON.parse(data);

  if (Date.now() - (parsed.ts || 0) > 30 * 24 * 60 * 60 * 1000) {
    localStorage.removeItem(getProfileKey(id));
    return null;
  }

  return parsed;
}

function getVideoId(url) {
  if (!url) return null;

  if (url.includes("shorts/")) {
    return url.split("shorts/")[1].split("?")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  return null;
}

/* isShort */
function isShort(url) {
  return url.includes("shorts/");
}

  /* isNewVideo */
function isNewVideo(item) {
  const published = Date.parse(item.pubDate);
  if (!published) return false; // fallback
  const hours = (Date.now() - published) / (1000 * 60 * 60);
  return hours <= 48;
}

/* CARD */
function createVideo(item) {

  const id = getVideoId(item.link);
  if (!id) return document.createElement("div");

  const isShortVideo = isShort(item.link);
  const isNew = isNewVideo(item);

  const saved = getProgress(id);

  const div = document.createElement("div");
  div.className = "video" + (isShortVideo ? " short" : "");
  div.setAttribute("data-id", id);

  div.dataset.title = item.title;
  div.dataset.date = item.pubDate;

  div.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
    <span>${item.title}</span>

    <!-- 🔥 FIX IST HIER -->
    <div class="video-hover" id="${uniqueId}"></div>

    ${isNew ? '<div class="badge-new">NEU</div>' : ''}
  `;

  // Progress-Bar wiederherstellen
  if (saved && saved.duration > 0) {
    const percent = (saved.time / saved.duration) * 100;

    setTimeout(() => {
      const bar = div.querySelector(".mini-progress");
      if (bar) bar.style.width = percent + "%";
    }, 0);
  }

  div.onclick = () => openPlayer(id);

  setTimeout(() => {
    attachHoverPopup(div, id);
  }, 0);

  return div;
}

async function loadChannelFeed(channelId, containerId, options = {}) {
  const {
    proxies = PROXIES,
    timeout = 4000,
    force = false
  } = options;

  const requestId = crypto.randomUUID?.() || Date.now() + Math.random();
  ACTIVE_REQUESTS.set(containerId, requestId);

  const container = document.getElementById(containerId);
  if (!container) return;

  if (container.dataset.loading === "1" && !force) return;
  container.dataset.loading = "1";
  container.dataset.failed = "0";

  const controller = new AbortController();
  FEED_ABORTS.set(containerId, controller);

  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  // -----------------------------
  // CACHE FIRST
  // -----------------------------
  const cached = getCachedFeed(channelId);
  if (cached && !force) {
    renderFeed(cached, container);
    container.dataset.loading = "0";
    return;
  }

  // -----------------------------
  // XML PARSER
  // -----------------------------
  const parseFeed = (text) => {
    const xml = new DOMParser().parseFromString(text, "text/xml");

    return [...xml.querySelectorAll("entry")].map(entry => ({
      title: entry.querySelector("title")?.textContent || "",
      link: entry.querySelector("link")?.getAttribute("href") || "",
      pubDate: entry.querySelector("published")?.textContent || ""
    }));
  };

  const isValid = (text) =>
    text && text.includes("<entry") && text.includes("<feed");

  // -----------------------------
  // FETCH WITH TIMEOUT
  // -----------------------------
  const fetchWithTimeout = (proxy) => {
    const target = proxy + encodeURIComponent(url);

    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => {
        reject(new Error("timeout"));
      }, timeout);

      fetch(target, { signal: controller.signal })
        .then(res => res.text())
        .then(text => {
          clearTimeout(timer);
          resolve({ text, proxy });
        })
        .catch(err => {
          clearTimeout(timer);
          reject(err);
        });
    });
  };

  // -----------------------------
  // STRATEGY: Sticky First, then fallback
  // -----------------------------
  const sticky = getStickyProxy(channelId, proxies);
  const others = proxies.filter(p => p !== sticky);

  try {
    let result;

    // 1️⃣ Try sticky proxy first (FAST PATH)
    try {
      result = await fetchWithTimeout(sticky);
    } catch (e) {
      // 2️⃣ fallback parallel (only if sticky fails)
      result = await Promise.any(
        others.map(p => fetchWithTimeout(p))
      );
    }

    const { text, proxy } = result;
    if (ACTIVE_REQUESTS.get(containerId) !== requestId) return;
    if (!isValid(text)) throw new Error("invalid feed");
    const parsed = parseFeed(text);
    if (!parsed.length) throw new Error("empty feed");

    // 💡 cache + sticky learning
    setCachedFeed(channelId, parsed);
    updateStickyProxy(channelId, proxy);

    if (ACTIVE_REQUESTS.get(containerId) !== requestId) return;

    renderFeed(parsed, container);
    container.dataset.loading = "0";
    return;

  } catch (err) {
    console.warn("Feed failed:", channelId, err);

    container.dataset.failed = "1";
    container.innerHTML = `
      <div style="padding:20px;color:#aaa;">
        Laden fehlgeschlagen<br><br>
        <button onclick="reloadChannel('${channelId}', '${containerId}')">
          neu versuchen
        </button>
      </div>
    `;
  } finally {
    container.dataset.loading = "0";
    FEED_ABORTS.delete(containerId);
  }
}

function renderFeed(entries, container) {

  container.innerHTML = "";

  entries.forEach(item => {

    const card = createVideo(item);

    container.appendChild(card);

    if (isNewVideo(item)) {
      allNewVideos.push(item);
    }

  });

}

function loadAll() {
  allNewVideos = [];
  document.getElementById("new-videos").innerHTML =
    "<div style='padding:20px'>Lade Inhalte...</div>";
    (async () => {
      for (const ch of ACTIVE_CHANNELS) {
        await loadChannelFeed(ch.channelId, ch.id);
        await new Promise(r => setTimeout(r, 400));
      }
      allNewVideos.sort((a, b) =>
        Date.parse(b.pubDate) - Date.parse(a.pubDate)
      );
      renderNewVideos();
      retryFailedRows();
  })();
}

function retryFailedRows() {

  ACTIVE_CHANNELS.forEach(ch => {
    const container = document.getElementById(ch.id);

    if (!container) return;

    if (container.dataset.failed === "1") {
      container.dataset.failed = "0";
      loadChannelFeed(ch.channelId, ch.id, { force: true });
    }
  });

}

  currentVideo = id;

  document.getElementById("overlay").style.display = "block";
  document.getElementById("playerView").style.display = "block";

    metaTitle.innerText = card.dataset.title || "Unbekannt";

    let dateText = "Unbekannt";

    if (card?.dataset?.date) {
      const d = new Date(card.dataset.date);

      dateText = d.toLocaleDateString("de-DE") + " " +
                d.toLocaleTimeString("de-DE", {
                  hour: "2-digit",
                  minute: "2-digit"
                }) + " Uhr";
    }

    metaDate.innerText = "Veröffentlicht: " + dateText;
    metaBox.style.display = "block";
    const likeBtn = document.getElementById("like-button");
    likeBtn.href = `https://www.youtube.com/watch?v=${currentVideo}`;
  }

  const saved = getProgress(id);
  const startTime = saved?.time || 0;

  if (!player) {
    player = new YT.Player("player", {
      videoId: id,
      playerVars: {
        autoplay: 0,
        controls: 1,
        rel: 0,
        modestbranding: 1
      },
      events: {
        onReady: () => {
          syncMuteOnce();
          forceMuteState();
          const waitForVideo = () => {

            const duration = player.getDuration?.();

            if (!duration || duration === 0) {
              setTimeout(waitForVideo, 200);
              return;
            }

            if (startTime > 1) {
              player.seekTo(startTime, true);
            }

            saveCurrent();
          };

          setTimeout(waitForVideo, 300);
        },
        onStateChange: onPlayerStateChange
      }
    });

  } else {
    player.cueVideoById(id);
    setTimeout(forceMuteState, 50);
    setTimeout(forceMuteState, 250);
    setTimeout(forceMuteState, 800);
    
    setTimeout(() => {
      
      const saved = getProgress(id);
      const time = saved?.time || 0;
    
      const waitSeek = () => {
    
        const duration = player.getDuration?.();
    
        if (!duration || duration === 0) {
          setTimeout(waitSeek, 200);
          return;
        }
    
        if (time > 1) {
          player.seekTo(time, true);
        }

        startProgress();
      };
    
      waitSeek();
    
    }, 300);
  }
}

  function onPlayerStateChange(e) {

  if (e.data === YT.PlayerState.PLAYING) {
    forceMuteState();
    startProgress();
    saveCurrent();
    colaStart();
  }
  
  if (e.data === YT.PlayerState.PAUSED) {
    saveCurrent();
    clearInterval(colaInterval);
  }

  if (e.data === YT.PlayerState.ENDED) {
    saveCurrent();
    renderContinueWatching();
  }
}

/* PROGRESS */
function startProgress() {

  clearInterval(progressInterval);
  
  progressInterval = setInterval(() => {
  
    if (!player || !currentVideo) return;
  
    const current = player.getCurrentTime();
    const duration = player.getDuration();
  
    if (!duration) return;
   
    const title = document.querySelector(`.video[data-id="${currentVideo}"] span`)?.innerText || "";
    const videoElement = document.querySelector(`.video[data-id="${currentVideo}"]`);
    const isShortVideo = videoElement?.classList.contains("short") || false;
    saveProgress(currentVideo, current, duration, title, isShortVideo);
  
    const percent = (current / duration) * 100;
  
    const cards = document.querySelectorAll(`.video[data-id="${currentVideo}"]`);
    
    cards.forEach(card => {
      const bar = card.querySelector(".mini-progress");
      if (bar) bar.style.width = percent + "%";
    });
  
  }, 500);
}

  /* PROGRESS Entries */
function getAllProgressEntries() {
  const items = [];
  const profile = localStorage.getItem("user") || "default";
  const prefix = `vid_${profile}_`;

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);

    if (!key.startsWith(prefix)) continue;

    try {
      const data = JSON.parse(localStorage.getItem(key));
      if (!data || data.time == null || data.duration == null) continue;

      const id = key.replace(prefix, "");

      const percent = data.time / data.duration;

      if (!isFinite(percent)) continue;
      if (percent < 0.1) continue;
      if (percent >= 0.98) continue;
      if (data.time < 10) continue;

      items.push({
        id,
        ...data
      });

    } catch (e) {
      console.warn("Bad entry:", key);
    }
  }

  return items.sort((a, b) => (b.ts || 0) - (a.ts || 0));
}

  
/* renderContinueWatching */
function renderContinueWatching() {

  const box = document.getElementById("continue-videos");
  const row = document.getElementById("continue-row");
  const title = document.getElementById("continue-title");

  if (!box || !row || !title) return;

  box.innerHTML = "";

  const items = getAllProgressEntries();

  if (!items.length) {
    row.style.display = "none";
    title.style.display = "none";
    return;
  }
  
  row.style.display = "block";
  title.style.display = "block";

  items.forEach(entry => {

    const div = document.createElement("div");
    div.className = "video" + (entry.isShort ? " short" : "");
    div.setAttribute("data-id", entry.id);

    const percent = (entry.time / entry.duration) * 100;

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${entry.id}/hqdefault.jpg">
      <span>${entry.title || "Weiter schauen"}</span>
      <div class="mini-progress" style="width:${percent}%"></div>
    `;

    div.onclick = () => openPlayer(entry.id);

    box.appendChild(div);
    
    setTimeout(() => {
      attachHoverPopup(div, entry.id);
    }, 0);
  });
}

/* renderNewVideos */
function renderNewVideos() {

  const heroBox = document.getElementById("hero-banner");
  const box = document.getElementById("new-videos");
  const row = document.getElementById("new-videos-row");

  box.innerHTML = "";

  if (!allNewVideos.length) {
    row.style.display = "none";
    document.getElementById("new-videos-title").style.display = "none";
  } else {
    row.style.display = "block";
    document.getElementById("new-videos-title").style.display = "block";
  }

  let heroItem = null;

  /* =========================
     1. PRIORITÄT: NEW VIDEOS
  ========================== */
  if (allNewVideos.length > 0) {
    heroItem = allNewVideos[0];
  }

  /* =========================
     2. FALLBACK: 1. CHANNEL
  ========================== */
  if (!heroItem) {

    const firstChannel = ACTIVE_CHANNELS[0];

    if (firstChannel) {

      const container = document.getElementById(firstChannel.id);

      if (container) {

        const firstCard = container.querySelector(".video");

        if (firstCard) {

          const img = firstCard.querySelector("img")?.src;
          const title = firstCard.querySelector("span")?.innerText || "Video";

          const match = img?.match(/vi\/(.+?)\//);

          if (match?.[1]) {
            heroItem = {
              link: "https://youtube.com/watch?v=" + match[1],
              title
            };
          }
        }
      }
    }
  }

  /* =========================
     3. ABSOLUTER FALLBACK
  ========================== */
  if (!heroItem) {
    heroBox.innerHTML = `<div style="color:white;padding:20px;">Kein Video verfügbar</div>`;
    return;
  }

  const heroId = getVideoId(heroItem.link);

  if (heroId) {
    heroBox.innerHTML = `
      <img src="https://img.youtube.com/vi/${heroId}/maxresdefault.jpg"
        onerror="this.src='https://img.youtube.com/vi/${heroId}/hqdefault.jpg'">

      <div class="hero-info">
        <h1>${heroItem.title}</h1>
      </div>
    `;

    heroBox.onclick = () => openPlayer(heroId);
  }

  /* =========================
     NEW VIDEO CARDS
  ========================== */
  allNewVideos.forEach(item => {
    const card = createVideo(item);
    box.appendChild(card);
  });
}

/* save Current Progress*/
function saveCurrent() {
  if (!player || !currentVideo || typeof player.getCurrentTime !== "function") return;
  
  const current = player.getCurrentTime?.() || 0;
  const duration = player.getDuration?.() || 0;

  if (!duration || current < 1) return;

  if (current >= duration - 2) {
    localStorage.removeItem(getProfileKey(currentVideo));
    return;
  }
  
  const title = document.querySelector(`.video[data-id="${currentVideo}"] span`)?.innerText || "";
  const videoElement = document.querySelector(`.video[data-id="${currentVideo}"]`);
  const isShortVideo = videoElement?.classList.contains("short") || false;
  saveProgress(currentVideo, current, duration, title, isShortVideo);
}

/* CLOSE */
function closePlayer() {
  saveCurrent();  
  document.getElementById("overlay").style.display = "none";
  document.getElementById("playerView").style.display = "none";

  if (player) {
    try { player.pauseVideo(); } catch(e) {}
  }

  document.getElementById("video-meta").style.display = "none";

  currentVideo = null;
  clearInterval(progressInterval);
  progressInterval = null;
  renderContinueWatching();
  clearInterval(colaInterval);

  if (player) {
    try {
      player.stopVideo();
      player.clearVideo();
    } catch(e) {}
  }
}

async function reloadChannel(channelId, containerId, el) {

  const container = document.getElementById(containerId);
  if (!container) return;

  const originalTitle = el.dataset.title;

  el.innerText = "⏳ Laden...";
  el.style.pointerEvents = "none";

  await loadChannelFeed(channelId, containerId, { force: true });

  el.innerText = originalTitle;
  el.style.pointerEvents = "auto";

  updateNewVideosFromDOM();
}

function updateNewVideosFromDOM() {

  allNewVideos = [];

  ACTIVE_CHANNELS.forEach(ch => {

    const container = document.getElementById(ch.id);
    if (!container) return;

    const cards = container.querySelectorAll(".video");

    cards.forEach(card => {

      const title = card.dataset.title;
      const date = card.dataset.date;
      const id = card.dataset.id;

      if (!title || !date || !id) return;

      const item = {
        title,
        link: "https://youtube.com/watch?v=" + id,
        pubDate: date
      };

      if (isNewVideo(item)) {
        allNewVideos.push(item);
      }
    });
  });

  // sortieren
  allNewVideos.sort((a, b) =>
    Date.parse(b.pubDate) - Date.parse(a.pubDate)
  );

  renderNewVideos();
}

function attachHoverPopup(card, videoId) {

  // Mobile / Touch Geräte ignorieren
  if (window.matchMedia("(hover: none)").matches) {
    return;
  }

  const container = card.querySelector(".video-hover");

  if (!container) return;

  let hoverPlayer = null;
  let hoverTimeout = null;
  let playerReady = false;
  let destroyed = false;

  async function ensurePlayer() {

    if (hoverPlayer || destroyed) return;

    // Warten bis YT API geladen
    if (!window.YT || !YT.Player) {
      await new Promise(resolve => {
        const wait = setInterval(() => {
          if (window.YT && YT.Player) {
            clearInterval(wait);
            resolve();
          }
        }, 100);
      });
    }

    if (destroyed) return;

    hoverPlayer = new YT.Player(container, {
      videoId: videoId,

      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 0,
        rel: 0,
        modestbranding: 1,
        playsinline: 1
      },

      events: {
        onReady: () => {
          playerReady = true;
        }
      }
    });
  }

  async function startHover() {

    destroyed = false;

    // kleiner Delay gegen Hover-Spam
    hoverTimeout = setTimeout(async () => {

      container.style.display = "block";

      await ensurePlayer();

      if (!hoverPlayer || !playerReady) return;

      try {
        hoverPlayer.seekTo(0);
        hoverPlayer.playVideo();
      } catch (e) {
        console.warn("Hover play failed", e);
      }

    }, 350);
  }

  function stopHover() {

    clearTimeout(hoverTimeout);

    container.style.display = "none";

    if (!hoverPlayer || !playerReady) return;

    try {
      hoverPlayer.pauseVideo();
      hoverPlayer.seekTo(0);
      hoverPlayer.destroy();
    } catch (e) {}
    hoverPlayer = null;
    playerReady = false;
    container.innerHTML = "";
  }

  card.addEventListener("pointerenter", startHover);
  card.addEventListener("pointerleave", stopHover);

  // Optional Cleanup wenn Card entfernt wird
  const observer = new MutationObserver(() => {

    if (!document.body.contains(card)) {

      destroyed = true;

      clearTimeout(hoverTimeout);

      if (hoverPlayer) {
        try {
          hoverPlayer.destroy();
        } catch (e) {}
      }

      observer.disconnect();
    }
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true
  });
}


function getProfileKey(id) {
  const profile = localStorage.getItem("user") || "default";
  return `vid_${profile}_${id}`;
}

function updateColaUI() {
  document.getElementById("colaCounter").innerHTML =
    `${colaCount} <img src="./cola.png" class="cola-icon">`;

  localStorage.setItem("colaCount", colaCount);
}

updateColaUI();

function addCola() {
  colaCount++;
  updateColaUI();
}

let colaInterval;

function spawnCola() {

  const rect = document.getElementById("playerView").getBoundingClientRect();

  const side = Math.random() < 0.5 ? "left" : "right";

  let x;

  if (side === "left") {
    x = rect.left - 60;
  } else {
    x = rect.right + 20;
  }

  const y = rect.top + Math.random() * rect.height;

  const cola = document.createElement("div");
  cola.className = "cola";

  cola.style.position = "fixed";
  cola.style.left = x + "px";
  cola.style.top = y + "px";

  cola.style.animationDuration = (8 + Math.random() * 4) + "s";

  cola.onclick = () => {
    addCola();
    cola.remove();
  };

  document.body.appendChild(cola);

  setTimeout(() => cola.remove(), 12000);
}

function colaStart() {

  clearInterval(colaInterval);

  colaInterval = setInterval(() => {
    spawnCola();
  }, 10000 + Math.random() * 10000);
}

function createLinkTile(title, imageOrText, link) {
  const a = document.createElement("a");
  a.href = link;
  a.className = "tile";

  // 🔷 Badge (wie vorher)
  const badge = document.createElement("div");
  badge.className = "tile-badge";
  badge.innerText = "LINK";

  const media = document.createElement("div");
  media.className = "tile-image";

  if (imageOrText.startsWith("http")) {
    media.style.backgroundImage = `url(${imageOrText})`;
  } else {
    media.classList.add("tile-text");
    media.innerText = imageOrText;
  }

  const label = document.createElement("div");
  label.className = "tile-title";
  label.innerText = title;

  a.appendChild(badge);
  a.appendChild(media);
  a.appendChild(label);

  return a;
}

function createChannelRow(title, rowId) {

  const row = document.createElement("div");
  row.className = "row";

  const h2 = document.createElement("h2");
  h2.innerText = title;

  const scroll = document.createElement("div");
  scroll.className = "row-scroll";
  scroll.id = rowId;

  row.appendChild(h2);
  row.appendChild(scroll);

  return { row, scroll };
}

function loadSingleChannelToView(channelId, title) {

  const container = document.getElementById("football-dynamic");
  if (!container) return;

  const rowId = "row-" + channelId;

  // 🔥 Row erstellen und in Page einfügen
  const { row, scroll } = createChannelRow(title, rowId);

  container.appendChild(row);

  // 🔥 nur diese Row befüllen
  loadChannelFeed(channelId, rowId);
}

function loadFootballPage() {

  const container = document.getElementById("football-dynamic");
  if (!container || container.dataset.loaded === "1") return;

  container.dataset.loaded = "1";

  loadSingleChannelToView(
    "UCMQkXTIDVvVDh0ZuVB_0APg",
    "Eintracht Spandau Fußball"
  );
    setTimeout(() => {
    loadFootballHeroFromFeed();
  }, 1000);
}

function renderFootballHero(item) {

  const hero = document.getElementById("hero-banner-football");
  if (!hero || !item) return;

  const id = getVideoId(item.link);

  hero.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg"
      onerror="this.src='https://img.youtube.com/vi/${id}/hqdefault.jpg'">

    <div class="hero-info">
      <h1>${item.title}</h1>
    </div>
  `;

  hero.onclick = () => openPlayer(id);
}

function loadFootballHeroFromFeed() {

  const container = document.getElementById("fussball-videos");
  if (!container) return;

  const firstCard = container.querySelector(".video");

  if (!firstCard) return;

  const img = firstCard.querySelector("img")?.src;
  const title = firstCard.querySelector("span")?.innerText || "Fußball";

  const match = img?.match(/vi\/(.+?)\//);
  if (!match) return;

  renderFootballHero({
    link: "https://youtube.com/watch?v=" + match[1],
    title
  });
}

function loadIconTiles() {

  const box = document.getElementById("icon-videos");
  if (!box) return;

  box.innerHTML = "";

  const tileTeam = createLinkTile(
    "Eintracht Spandau – Icon League",
    "EINTRACHT SPANDAU",

  );

  );

  );

function setSkin(skinName) {
  document.body.classList.remove("skin-classic", "skin-white", "skin-citadel");
  document.body.classList.add(skinName);

  localStorage.setItem("skin", skinName);
  toggleSkinMenu();
}

function toggleSkinMenu() {
  const menu = document.getElementById("skinMenu");

  if (menu.style.display === "flex") {
    menu.style.display = "none";
    return;
  }

  renderSkinMenu(); // 🔥 wichtig: jedes Mal neu berechnen
  menu.style.display = "flex";
}

function renderSkinMenu() {

  const menu = document.getElementById("skinMenu");
  menu.style.background = getComputedStyle(document.body)
  .getPropertyValue("--bg");
  menu.innerHTML = "<h3>Skins</h3>";

  Object.entries(SKINS).forEach(([key, skin]) => {

    const unlocked = colaCount >= skin.required;

    const div = document.createElement("div");
    div.className = "skin-item";

    div.innerHTML = `
      ${skin.name} 
      ${unlocked ? "" : `🔒 (${skin.required} 🧃)`}
    `;

    if (unlocked) {
      div.onclick = () => setSkin(key);
    } else {
      div.style.opacity = "0.4";
      div.style.cursor = "not-allowed";
    }

    menu.appendChild(div);
  });
}

function getCachedFeed(channelId) {
  const cached = FEED_CACHE.get(channelId);
  if (!cached) return null;
  const isExpired =
    Date.now() - cached.timestamp > CACHE_TIME;

  if (isExpired) {
    FEED_CACHE.delete(channelId);
    return null;
  }
  return cached.data;
}

function setCachedFeed(channelId, data) {
  FEED_CACHE.set(channelId, {
    data,
    timestamp: Date.now()
  });
}

function getStickyProxy(channelId) {
  const sticky = CHANNEL_PROXY_MAP.get(channelId);
  if (sticky && PROXIES.includes(sticky)) {
    return sticky;
  }
  // fallback: einmal initial wählen
  const fallback = PROXIES[Math.floor(Math.random() * PROXIES.length)];
  CHANNEL_PROXY_MAP.set(channelId, fallback);
  return fallback;
}

function updateStickyProxy(channelId, proxy) {
  const current = CHANNEL_PROXY_MAP.get(channelId);
  // nur ersetzen wenn neuer Proxy besser sein könnte
  if (!current || current !== proxy) {
    CHANNEL_PROXY_MAP.set(channelId, proxy);
  }
}

/* EVENTS */
document.getElementById("overlay").addEventListener("pointerdown", closePlayer);
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    saveCurrent();
  }
});

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePlayer();
});
