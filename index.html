<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mein Wochenplan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .day {
      background: white;
      border-radius: 10px;
      padding: 10px;
      min-height: 150px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .day h2 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 100px;
      border: none;
      resize: none;
      outline: none;
      font-family: inherit;
    }

    @media (max-width: 900px) {
      .week {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<h1>📅 Mein Wochenplan</h1>

<div class="week">
  <div class="day">
    <h2>Montag</h2>
    <textarea placeholder="Einträge..."></textarea>
  </div>

  <div class="day">
    <h2>Dienstag</h2>
    <textarea></textarea>
  </div>

  <div class="day">
    <h2>Mittwoch</h2>
    <textarea></textarea>
  </div>

  <div class="day">
    <h2>Donnerstag</h2>
    <textarea></textarea>
  </div>

  <div class="day">
    <h2>Freitag</h2>
    <textarea></textarea>
  </div>

  <div class="day">
    <h2>Samstag</h2>
    <textarea></textarea>
  </div>

  <div class="day">
    <h2>Sonntag</h2>
    <textarea></textarea>
  </div>
</div>

</body>
</html>
