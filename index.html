<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsflix</title>

<link rel="icon" type="image/jpeg" href="./pic.jpg">
<script src="https://www.youtube.com/iframe_api"></script>

<style>

:root {
  --bg: #141413;
  --text: #9B978E;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LOGIN */
#loginBox {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 250px;
  margin: 150px auto;
  text-align: center;
}

#loginBox input {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

#loginBox button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* APP */
.container { padding: 20px; display: none; }

.logo { width: 80px; margin-bottom: 20px; cursor: pointer; }
.logo img { width: 60px; }

.row { margin-bottom: 30px; }
.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}
.row-scroll::-webkit-scrollbar { display: none; }

.video {
  min-width: 200px;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.video img { width: 100%; }

.video span {
  padding: 6px;
  display: block;
  font-size: 12px;
}

.mini-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: red;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
}

.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
}

#player { width: 100%; height: 100%; }

/* USER BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.logout {
  cursor: pointer;
  background: #333;
  padding: 6px 10px;
  border-radius: 6px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Einsflix Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Passwort">

  <button onclick="handleLogin()">Einloggen</button>
</div>

<!-- APP -->
<div class="container" id="app">

  <div class="topbar">
    <div id="welcome"></div>
    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <div class="logo" onclick="reloadDashboard()">
    <img src="./pic.jpg">
  </div>

  <div class="row">
    <h2>Eintracht Spandau</h2>
    <div class="row-scroll" id="spandau-videos"></div>
  </div>

  <div class="row">
    <h2>LoL</h2>
    <div class="row-scroll" id="lol-videos"></div>
  </div>

</div>

<div class="overlay" id="overlay"></div>

<div class="preview">
  <div id="player"></div>
</div>

<script>

/* ======================
   🔐 LOGIN SYSTEM
====================== */

const FAKE_PASSWORD = "EinsAufDieEins";

function login(username, password) {
  if (!username || username.trim() === "") return false;

  if (password === FAKE_PASSWORD) {
    localStorage.setItem("currentUser", username.trim());
    localStorage.setItem("loggedIn", "true");
    return true;
  }

  return false;
}

function isLoggedIn() {
  return localStorage.getItem("loggedIn") === "true";
}

function getCurrentUser() {
  return localStorage.getItem("currentUser");
}

function logout() {
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("currentUser");
  location.reload();
}

/* ======================
   LOGIN HANDLER
====================== */

function handleLogin() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const ok = login(user, pass);

  if (ok) {
    startApp();
  } else {
    alert("Falsches Passwort!");
  }
}

/* ======================
   APP START
====================== */

function startApp() {

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("welcome").innerText =
    "Willkommen " + getCurrentUser();

  loadAll();
}

/* Auto login */
window.onload = () => {
  if (isLoggedIn()) {
    startApp();
  }
};

/* ======================
   VIDEO SYSTEM (gekürzt)
====================== */

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw"
};

let player;
let currentVideo = null;

/* Progress Storage */
function saveProgress(id, time, duration) {

  if (!duration) return;
  if (time / duration < 0.10) return;

  localStorage.setItem("vid_" + id, JSON.stringify({
    time,
    duration,
    updatedAt: Date.now()
  }));

  cleanupStorage();
}

function getProgress(id) {
  const data = localStorage.getItem("vid_" + id);
  return data ? JSON.parse(data) : null;
}

/* Cleanup (75 + 30 Tage) */
function cleanupStorage() {

  const MAX_ITEMS = 75;
  const MAX_DAYS = 30;

  const now = Date.now();

  let items = Object.keys(localStorage)
    .filter(k => k.startsWith("vid_"))
    .map(k => {
      const d = JSON.parse(localStorage.getItem(k));
      return { key: k, updatedAt: d.updatedAt || 0 };
    });

  items.forEach(i => {
    if ((now - i.updatedAt) / 86400000 > MAX_DAYS) {
      localStorage.removeItem(i.key);
    }
  });

  items = Object.keys(localStorage)
    .filter(k => k.startsWith("vid_"))
    .map(k => JSON.parse(localStorage.getItem(k)))
    .sort((a,b) => b.updatedAt - a.updatedAt);

  if (items.length > MAX_ITEMS) {
    items.slice(MAX_ITEMS).forEach(i => {
      localStorage.removeItem("vid_" + i.id);
    });
  }
}

/* Dashboard reload */
function reloadDashboard() {
  loadAll();
}

/* dummy load */
function loadAll() {
  console.log("Videos laden...");
}

</script>

</body>
</html>
